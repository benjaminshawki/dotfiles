version: '3.8'
services:
  flask-app:
    build: .
    volumes:
      - ./app:/app
    environment:
      - FLASK_ENV=development

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./app:/app
    depends_on:
      - flask-app
  
