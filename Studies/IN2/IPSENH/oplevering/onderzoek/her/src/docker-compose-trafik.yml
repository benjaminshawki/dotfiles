version: "3"

services:
  traefik:
    image: traefik:v2.5
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  app:
    image: myapp:${SHA}
    labels:
      - "traefik.http.routers.${SHA}.rule=Host(`${SHA}.example.com`)"
      - "traefik.http.routers.root.rule=Host(`example.com`)"
