http {
    lua_shared_dict backends 10m;

    init_by_lua_block {
        backends = ngx.shared.backends
    }

    server {
        listen 80;

        location / {
            set $backend "";
            access_by_lua_block {
                local sha = ngx.var.http_x_commit_sha or "default"
                ngx.var.backend = backends:get(sha) or "default"
            }
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name ~^(?<sha>[a-f0-9]{7})\.example\.com$;

        location / {
            set $backend "";
            access_by_lua_block {
                local sha = ngx.var.sha
                ngx.var.backend = backends:get(sha) or "default"
            }
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
